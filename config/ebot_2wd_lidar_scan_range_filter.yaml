# The LIDAR is mounted on the vertical frame of the ebot robot.
# The frame on the left and right need to be filtered.
# Note, the LIDAR is mounted with a 180 degree rotation.  
# As such, it requires two filters to clear that portion of the scan.
#
# Front of robot
#                                 3.14
# (block +/-30 degrees)  -1.57   LIDAR   1.57 (block +/-30 degress)
#                                  0
# Back of robot

scan_to_scan_filter_chain:
  ros__parameters:
    filter1:
      name: angle_filter1
      type: laser_filters/LaserScanAngularBoundsFilterInPlace
      params:
        lower_angle: -2.09
        upper_angle: -1.05
    filter2:
      name: angle_filter2
      type: laser_filters/LaserScanAngularBoundsFilterInPlace
      params:
        lower_angle: 1.05
        upper_angle: 2.09
